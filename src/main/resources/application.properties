# Use PORT env var injected by cloud platforms, fall back to 3000 for local dev
server.port=${PORT:3000}

# Allow large HEIC uploads (iPhone RAW can be 50+ MB)
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# Keep uploaded files IN MEMORY — do NOT write temp files to disk.
# Without this, parallel uploads fill up the Windows temp folder and crash.
spring.servlet.multipart.file-size-threshold=200MB

# Tomcat thread pool — each concurrent request gets its own thread
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# Show our own logs clearly
logging.level.com.heicconverter=INFO
