# Fly.io deployment config for HEIC to JPG Converter
# Single container: React frontend + Spring Boot backend + Node.js helper

app = "heic-to-jpg-converter"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 100
    hard_limit = 200

[[vm]]
  memory   = "1gb"
  cpu_kind = "shared"
  cpus     = 1
